<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8">
<title>VEV — load error</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0C1116; color: #FAFBFC;
    font-family: 'Familjen Grotesk', 'Segoe UI', -apple-system, sans-serif;
    display: flex; align-items: center; justify-content: center;
  }
  .card { max-width: 72vw; border-left: 6px solid #FF5A47; padding: 4vh 4vw; }
  .badge {
    display: inline-block; color: #FF5A47; border: 1px solid #FF5A47;
    padding: .5vh 1.6vh; letter-spacing: .18em; font-size: 2vh; margin-bottom: 3vh;
  }
  h1 { font-size: 6vh; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 2vh; }
  .url {
    font-family: 'JetBrains Mono', Consolas, monospace; font-size: 2.6vh;
    color: #1FB6F6; word-break: break-all; margin-bottom: 1.5vh;
  }
  .err { font-size: 2.4vh; color: rgba(255,255,255,.65); margin-bottom: 3vh; }
  .hint { font-size: 2vh; color: rgba(255,255,255,.45); }
  .wordmark { position: absolute; top: 4vh; left: 4vw; font-size: 3.2vh; font-weight: 600; }
  .wordmark span { color: #1FB6F6; }
</style>
</head>
<body>
  <div class="wordmark">VEV<span>.</span></div>
  <div class="card">
    <div class="badge">LOAD ERROR</div>
    <h1>Couldn't load the page</h1>
    <div class="url" id="url"></div>
    <div class="err" id="err"></div>
    <div class="hint">Press "Reload" in the VEV control to try again.</div>
  </div>
<script>
  'use strict';
  var q = new URLSearchParams(location.search);
  document.getElementById('url').textContent = q.get('url') || '';
  document.getElementById('err').textContent = q.get('err') || 'Unknown error';
</script>
</body>
</html>
